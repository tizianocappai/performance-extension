<!doctype html>
<html lang="it">
	<head>
		<meta charset="UTF-8" />
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				width: 320px;
				font-family: system-ui, sans-serif;
				font-size: 13px;
				background: #0f0f11;
				color: #e2e2e8;
				padding: 14px;
			}

			header {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 14px;
			}
			header h1 {
				font-size: 15px;
				font-weight: 600;
				flex: 1;
			}
			#status-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #22c55e;
				animation: pulse 2s infinite;
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.4;
				}
			}

			.card {
				background: #1a1a1f;
				border: 1px solid #2a2a35;
				border-radius: 10px;
				padding: 12px 14px;
				margin-bottom: 10px;
			}

			.card-label {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: #6b6b80;
				margin-bottom: 6px;
			}

			.metric-row {
				display: flex;
				align-items: baseline;
				gap: 6px;
			}
			.metric-val {
				font-size: 28px;
				font-weight: 700;
				line-height: 1;
				color: #fff;
			}
			.metric-unit {
				font-size: 13px;
				color: #888;
			}
			.metric-sub {
				font-size: 11px;
				color: #555;
				margin-top: 3px;
			}

			.bar-wrap {
				background: #252530;
				border-radius: 4px;
				height: 6px;
				margin-top: 8px;
				overflow: hidden;
			}
			.bar-fill {
				height: 100%;
				border-radius: 4px;
				transition:
					width 0.5s ease,
					background 0.5s ease;
			}

			canvas {
				display: block;
				width: 100% !important;
				margin-top: 8px;
			}

			#url-label {
				font-size: 10px;
				color: #44445a;
				margin-top: 4px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.no-data {
				text-align: center;
				color: #555;
				padding: 24px 0;
				font-size: 12px;
			}

			footer {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 6px;
				font-size: 10px;
				color: #44445a;
			}
			#reset-btn {
				background: none;
				border: 1px solid #2a2a35;
				color: #6b6b80;
				border-radius: 5px;
				padding: 2px 8px;
				cursor: pointer;
				font-size: 10px;
			}
			#reset-btn:hover {
				border-color: #555;
				color: #aaa;
			}
		</style>
	</head>
	<body>
		<header>
			<div id="status-dot"></div>
			<h1>PerfMonitor</h1>
			<span id="url-label">–</span>
		</header>

		<div id="main-content">
			<div class="no-data">Naviga su una pagina per vedere i dati…</div>
		</div>

		<footer>
			<span id="last-update">–</span>
			<button id="reset-btn">Reset contatori</button>
		</footer>

		<script src="popup.js"></script>
	</body>
</html>
